openapi: 3.0.1
info:
  title: getdon-api
  version: 0.0.1-SNAPSHOT
servers:
- url: https://getdon-api.duckdns.org
- url: http://localhost:8080
tags: []
paths:
  /api/meeting-member/join:
    post:
      tags:
      - MeetingMember
      summary: 모임 참여
      description: 초대코드로 모임에 참여합니다.
      operationId: meeting-member-join
      security:
      - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinMeetingRequest"
            examples:
              meeting-member-join:
                value: "{\"inviteCode\":\"ABCD1234\"}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              examples:
                meeting-member-join:
                  value: "{\"message\":\"모임 통장에 초대되었습니다.\",\"data\":null,\"status\"\
                    :201}"
  /api/meeting/create:
    post:
      tags:
      - Meeting
      summary: 모임 생성
      description: 모임 통장을 개설합니다. 생성자는 자동으로 LEADER가 됩니다.
      operationId: meeting-create
      security:
      - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeetingRequest"
            examples:
              meeting-create:
                value: "{\"title\":\"테스트 모임\",\"bankName\":\"카카오뱅크\",\"bankAccount\"\
                  :1234567890}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              examples:
                meeting-create:
                  value: "{\"message\":\"모임 통장 개설 완료되었습니다.\",\"data\":null,\"status\"\
                    :201}"
  /api/meeting/invite-code:
    get:
      tags:
      - Meeting
      summary: 모임 초대코드 조회
      description: 모임 ID로 초대코드를 조회합니다.
      operationId: meeting-invite-code
      security:
      - bearerAuth: []
      parameters:
      - name: meetingId
        in: query
        description: 모임 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCodeResponse"
              examples:
                meeting-invite-code:
                  value: "{\"message\":\"정상 처리됐습니다.\",\"data\":\"ABCD1234\",\"status\"\
                    :200}"
  /api/meeting/my-list:
    get:
      tags:
      - Meeting
      summary: 내 모임 목록 조회
      description: 로그인한 사용자가 속한 모임 목록을 조회합니다.
      operationId: meeting-my-list
      security:
      - bearerAuth: []
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyMeetingListResponse"
              examples:
                meeting-my-list:
                  value: "{\"message\":\"정상 처리됐습니다.\",\"data\":[{\"meetingId\":1,\"\
                    title\":\"테스트 모임\",\"bankName\":\"카카오뱅크\",\"amount\":50000,\"\
                    paidCount\":3}],\"status\":200}"
  /api/member/join:
    post:
      tags:
      - Member
      summary: 회원가입
      description: 이메일과 비밀번호로 회원가입합니다.
      operationId: member-
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSaveRequest"
            examples:
              member-create:
                value: "{\"userName\":\"테스터\",\"email\":\"test@test.com\",\"password\"\
                  :\"password123!\"}"
              member-join:
                value: "{\"userName\":\"테스터\",\"email\":\"test@test.com\",\"password\"\
                  :\"password123!\"}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              examples:
                member-create:
                  value: "{\"message\":\"회원가입이 정상적으로 완료됐습니다.\",\"data\":null,\"status\"\
                    :201}"
                member-join:
                  value: "{\"message\":\"회원가입이 정상적으로 완료됐습니다.\",\"data\":null,\"status\"\
                    :201}"
  /api/member/login:
    post:
      tags:
      - Member
      summary: 로그인
      description: 이메일과 비밀번호로 로그인합니다.
      operationId: member-login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginRequest"
            examples:
              member-login:
                value: "{\"email\":\"test@test.com\",\"password\":\"password123!\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserLoginResponse"
              examples:
                member-login:
                  value: "{\"message\":\"로그인이 정상적으로 완료됐습니다.\",\"data\":{\"accessToken\"\
                    :\"access-token-value\",\"refreshToken\":\"refresh-token-value\"\
                    },\"status\":200}"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserLoginResponse:
      title: UserLoginResponse
      required:
      - message
      - status
      type: object
      properties:
        data:
          required:
          - accessToken
          - refreshToken
          type: object
          properties:
            accessToken:
              type: string
              description: 액세스 토큰
            refreshToken:
              type: string
              description: 리프레시 토큰
        message:
          type: string
          description: 응답 메시지
        status:
          type: number
          description: HTTP 상태 코드
    CreateMeetingRequest:
      title: CreateMeetingRequest
      type: object
      properties:
        bankAccount:
          type: number
          description: 계좌번호
          nullable: true
        bankName:
          type: string
          description: 은행명
          nullable: true
        title:
          type: string
          description: 모임 이름
          nullable: true
    UserSaveRequest:
      title: UserSaveRequest
      required:
      - email
      - password
      - userName
      type: object
      properties:
        password:
          type: string
          description: 비밀번호
        userName:
          type: string
          description: 사용자 이름
        email:
          type: string
          description: 이메일
    ApiResponse:
      title: ApiResponse
      required:
      - data
      - message
      - status
      type: object
      properties:
        message:
          type: string
          description: 응답 메시지
        status:
          type: number
          description: HTTP 상태 코드
    UserLoginRequest:
      title: UserLoginRequest
      required:
      - email
      - password
      type: object
      properties:
        password:
          type: string
          description: 비밀번호
        email:
          type: string
          description: 이메일
    InviteCodeResponse:
      title: InviteCodeResponse
      required:
      - data
      - message
      - status
      type: object
      properties:
        data:
          type: string
          description: 초대코드 (8자리 대문자)
        message:
          type: string
          description: 응답 메시지
        status:
          type: number
          description: HTTP 상태 코드
    MyMeetingListResponse:
      title: MyMeetingListResponse
      required:
      - message
      - status
      type: object
      properties:
        data:
          type: array
          items:
            required:
            - amount
            - bankName
            - meetingId
            - paidCount
            - title
            type: object
            properties:
              amount:
                type: number
                description: 모임 통장 잔액
              paidCount:
                type: number
                description: 납부 완료 횟수
              bankName:
                type: string
                description: 은행명
              meetingId:
                type: number
                description: 모임 ID
              title:
                type: string
                description: 모임 이름
        message:
          type: string
          description: 응답 메시지
        status:
          type: number
          description: HTTP 상태 코드
    JoinMeetingRequest:
      title: JoinMeetingRequest
      required:
      - inviteCode
      type: object
      properties:
        inviteCode:
          type: string
          description: 모임 초대코드 (8자리)
